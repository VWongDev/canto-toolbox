<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese Word Statistics</title>
  <link rel="stylesheet" href="./stats.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-icon">漢</div>
      <h1>Word Statistics</h1>
      <p class="subtitle">Your most frequently hovered Chinese words</p>
    </header>

    <div class="controls">
      <button id="clear-btn" class="btn btn-danger">Clear Statistics</button>
      <span class="word-count" id="word-count">0 words tracked</span>
    </div>

    <div class="stats-container">
      <div id="loading" class="loading">Loading statistics...</div>
      <div id="empty-state" class="empty-state" style="display: none;">
        <div class="empty-state-icon">字</div>
        <p>No statistics yet.<br>Start hovering over Chinese words on web pages to track them.</p>
      </div>
      <div id="stats-list" class="stats-list" style="display: none;"></div>
    </div>
  </div>

  <script type="module" src="./stats.ts"></script>
</body>
</html>
